id = "y011d4.agentweb"
name = "Herdr Agent Web"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Monitor and control herdr agents from your phone or browser — a PWA + REST/WS bridge"
platforms = ["linux", "macos"]

[[build]]
command = ["npm", "ci"]

[[build]]
command = ["npm", "run", "build"]

[[actions]]
id = "start"
title = "Start Agent Web bridge"
contexts = ["workspace"]
command = ["node", "dist/bin/agentwebctl.js", "start"]

[[actions]]
id = "stop"
title = "Stop Agent Web bridge"
contexts = ["workspace"]
command = ["node", "dist/bin/agentwebctl.js", "stop"]

[[actions]]
id = "status"
title = "Agent Web bridge status"
contexts = ["workspace"]
command = ["node", "dist/bin/agentwebctl.js", "status"]

[[panes]]
id = "server"
title = "Agent Web bridge"
placement = "tab"
command = ["node", "dist/bin/agentwebctl.js", "run"]

[[panes]]
id = "connect"
title = "Connect phone"
placement = "overlay"
command = ["node", "dist/bin/agentwebctl.js", "qr"]
